name: iOS App Store Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Step 1 - npm install
        run: |
          echo "Starting npm install..."
          npm install --no-audit --no-fund 2>&1
          echo "npm install exit code: $?"
          echo "Done"

      - name: Step 2 - Build
        run: |
          echo "Starting build..."
          npm run build 2>&1
          echo "Done"

      - name: Step 3 - Cap Sync
        run: |
          npx cap sync ios 2>&1
          echo "Done"

      - name: Step 4 - Pod Install
        run: |
          cd ios/App
          pod install 2>&1
          echo "Done"

      - name: Step 5 - Code Signing
        env:
          P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "Setting up code signing..."
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "pw123" ios-build.keychain
          security list-keychains -d user -s ios-build.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s ios-build.keychain
          security unlock-keychain -p "pw123" ios-build.keychain
          security set-keychain-settings -t 3600 ios-build.keychain
          security import /tmp/cert.p12 -k ios-build.keychain -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -f pkcs12
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "pw123" ios-build.keychain
          security find-identity -v -p codesigning ios-build.keychain
          echo "$PROFILE_BASE64" | base64 --decode > /tmp/build.mobileprovision
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' \
            /dev/stdin <<< $(security cms -D -i /tmp/build.mobileprovision))
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/build.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "Profile UUID: $UUID"
          echo "Done"

      - name: Step 6 - Archive
        run: |
          echo "Building archive..."
          set -o pipefail
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Apple Distribution: Akram Aljabiri (RH8HBHDA3T)" \
            PROVISIONING_PROFILE_SPECIFIER="Building Station App Store" \
            DEVELOPMENT_TEAM=RH8HBHDA3T \
            OTHER_CODE_SIGN_FLAGS="--keychain ios-build.keychain" \
            2>&1 | grep -E "(error:|BUILD SUCCEEDED|BUILD FAILED)" | tail -30
          [ -d /tmp/App.xcarchive ] && echo "✅ Archive OK" || { echo "❌ FAILED"; exit 1; }

      - name: Step 7 - Export IPA
        run: |
          cat > /tmp/export.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>RH8HBHDA3T</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.buildingstation.app</key>
              <string>Building Station App Store</string>
            </dict>
          </dict></plist>
          PLIST
          mkdir -p /tmp/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist /tmp/export.plist
          ls /tmp/ipa/

      - name: Step 8 - Upload to App Store
        env:
          APPLE_USER: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          APPLE_PASS: ${{ secrets.APP_STORE_CONNECT_APP_SPECIFIC_PASSWORD }}
        run: |
          IPA=$(find /tmp/ipa -name "*.ipa" | head -1)
          xcrun altool --upload-app --type ios \
            --file "$IPA" --username "$APPLE_USER" --password "$APPLE_PASS"

      - name: Save IPA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iOS-${{ github.run_number }}
          path: /tmp/ipa/*.ipa
          if-no-files-found: warn
