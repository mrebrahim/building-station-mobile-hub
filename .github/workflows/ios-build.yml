name: iOS App Store Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check all secrets
        run: |
          echo "Checking secrets..."
          P12="${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}"
          PASS="${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}"
          PROF="${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}"
          USER="${{ secrets.APP_STORE_CONNECT_USERNAME }}"
          APPPASS="${{ secrets.APP_STORE_CONNECT_APP_SPECIFIC_PASSWORD }}"

          [ -n "$P12" ]     && echo "✅ P12 exists (${#P12} chars)"     || echo "❌ P12 MISSING"
          [ -n "$PASS" ]    && echo "✅ PASSWORD exists"                 || echo "❌ PASSWORD MISSING"
          [ -n "$PROF" ]    && echo "✅ PROFILE exists (${#PROF} chars)" || echo "❌ PROFILE MISSING"
          [ -n "$USER" ]    && echo "✅ USERNAME exists"                 || echo "❌ USERNAME MISSING"
          [ -n "$APPPASS" ] && echo "✅ APP_PASSWORD exists"             || echo "❌ APP_PASSWORD MISSING"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build React app
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Import Certificate
        env:
          P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/distribution.p12
          security create-keychain -p "actions_password" build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s build.keychain
          security unlock-keychain -p "actions_password" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain
          security import /tmp/distribution.p12 \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -f pkcs12
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "actions_password" build.keychain
          echo "=== Signing Identities ==="
          security find-identity -v -p codesigning build.keychain

      - name: Import Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin \
            <<< $(security cms -D -i /tmp/profile.mobileprovision))
          echo "Profile UUID: $PROFILE_UUID"
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "✅ Profile installed"

      - name: Build Archive
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Apple Distribution: Akram Aljabiri (RH8HBHDA3T)" \
            PROVISIONING_PROFILE_SPECIFIER="Building Station App Store" \
            DEVELOPMENT_TEAM=RH8HBHDA3T \
            2>&1 | tee /tmp/build.log | \
            grep -E "(error:|warning:|BUILD|FAILED|succeeded|Signing|CodeSign)" || true

          if [ ! -d "/tmp/App.xcarchive" ]; then
            echo "❌ BUILD FAILED - Last errors:"
            grep "error:" /tmp/build.log | tail -20
            exit 1
          fi
          echo "✅ Archive created!"

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>RH8HBHDA3T</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.buildingstation.app</key>
              <string>Building Station App Store</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          mkdir -p /tmp/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist
          ls -la /tmp/ipa/

      - name: Upload to App Store
        env:
          USERNAME: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_STORE_CONNECT_APP_SPECIFIC_PASSWORD }}
        run: |
          IPA=$(find /tmp/ipa -name "*.ipa" | head -1)
          [ -z "$IPA" ] && echo "❌ No IPA" && exit 1
          echo "Uploading: $IPA"
          xcrun altool --upload-app --type ios \
            --file "$IPA" \
            --username "$USERNAME" \
            --password "$APP_PASSWORD"

      - name: Save IPA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: BuildingStation-iOS-${{ github.run_number }}
          path: /tmp/ipa/*.ipa
          retention-days: 14
          if-no-files-found: warn
