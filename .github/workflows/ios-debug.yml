name: iOS Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Full Debug Info
        run: |
          echo "=== System Info ==="
          sw_vers
          xcodebuild -version
          node -v 2>/dev/null || echo "No node"
          npm -v 2>/dev/null || echo "No npm"
          ruby -v
          pod --version 2>/dev/null || echo "No pod"
          
          echo ""
          echo "=== Repo files ==="
          ls -la
          
          echo ""
          echo "=== package.json ==="
          cat package.json | head -20
          
          echo ""
          echo "=== iOS folder ==="
          ls ios/App/ 2>/dev/null || echo "No ios folder"
          
          echo ""
          echo "=== Secrets check ==="
          [ -n "$P12" ] && echo "✅ P12 ok" || echo "❌ P12 missing"
          [ -n "$PROF" ] && echo "✅ PROFILE ok" || echo "❌ PROFILE missing"
          [ -n "$USER" ] && echo "✅ USER ok" || echo "❌ USER missing"
        env:
          P12: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
          PROF: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          USER: ${{ secrets.APP_STORE_CONNECT_USERNAME }}

      - name: Test npm install
        run: |
          echo "=== Starting npm install ==="
          npm install --legacy-peer-deps 2>&1
          echo "Exit code: $?"
