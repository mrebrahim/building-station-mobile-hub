workflows:

  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Building_Station_ASC

    environment:
      vars:
        BUNDLE_ID: "com.buildingstation.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps

      - name: Build React app
        script: npm run build

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set build number
        script: |
          BUILD_NUMBER=$PROJECT_BUILD_NUMBER
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion $BUILD_NUMBER" \
            ios/App/App/Info.plist

      - name: Initialize keychain
        script: keychain initialize

      - name: Revoke stale distribution certificates
        script: |
          # Each successful build creates a fresh Distribution cert whose
          # private key only exists inside that build's storage. Apple
          # keeps only one active Distribution cert per team, so before
          # 'certificates create' we clear the slate — we can't reuse the
          # previous cert anyway (its private key is long gone).
          set +e
          echo "=== Listing IOS_DISTRIBUTION certificates ==="
          LIST_OUTPUT=$(app-store-connect certificates list --certificate-type IOS_DISTRIBUTION 2>&1)
          echo "$LIST_OUTPUT"
          echo "=== End of list ==="

          # Codemagic CLI prints one 'Id: XXXX' per record in plain text output.
          IDS=$(echo "$LIST_OUTPUT" | awk '/^Id:/ {print $2}')
          if [ -z "$IDS" ]; then
            echo "No existing Distribution certificates to revoke."
          else
            for id in $IDS; do
              echo "--- Revoking $id ---"
              app-store-connect certificates delete "$id"
            done
          fi
          exit 0

      - name: Generate certificate private key
        script: |
          openssl genrsa -out /tmp/cert_private_key.pem 2048

      - name: Create a new distribution certificate (owned by Codemagic)
        script: |
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key @file:/tmp/cert_private_key.pem \
            --save

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_private_key.pem \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply signing profiles to Xcode project
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - building_station_keystore
      node: 22
      java: 17

    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps

      - name: Build React app
        script: npm run build

      - name: Capacitor sync Android
        script: npx cap sync android

      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - android/app/build/outputs/**/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
