workflows:

  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Building_Station_ASC

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.buildingstation.app
      node: 20.17.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps

      - name: Build React app
        script: npm run build

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set build number
        script: |
          BUILD_NUMBER=$PROJECT_BUILD_NUMBER
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion $BUILD_NUMBER" \
            ios/App/App/Info.plist

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.buildingstation.app" \
            --type IOS_APP_STORE \
            --create

      - name: Apply signing profiles to Xcode project
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - building_station_keystore
      node: 20.17.0
      java: 17

    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps

      - name: Build React app
        script: npm run build

      - name: Capacitor sync Android
        script: npx cap sync android

      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - android/app/build/outputs/**/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
