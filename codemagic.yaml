workflows:
  ios-release:
    name: iOS Release (App Store)
    max_build_duration: 120
    environment:
      node: 20.0.0
      xcode: latest
      cocoapods: default
      vars:
        APP_ID: com.buildingstation.app
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.buildingstation.app

    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps

      - name: Build React app
        script: npm run build

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  android-release:
    name: Android Release (Google Play)
    max_build_duration: 60
    environment:
      node: 20.0.0
      java: 17

    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps

      - name: Build React app
        script: npm run build

      - name: Capacitor sync Android
        script: npx cap sync android

      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
